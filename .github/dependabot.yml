# Dependabot - Automated Security Updates
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "fix"
      include: "scope"
    groups:
      production-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "security"
    reviewers:
      - "Alan-TheGentleman"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
      - "dependencies"
