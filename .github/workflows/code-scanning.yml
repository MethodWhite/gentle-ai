# Code Scanning - SAST
name: Code Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: read
  security-events: write

jobs:
  gosec-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Gosec Security Scanner
        uses: securego/gosec@627f90b19c25ab4d3f22b6d1524c8f1b6c3b9a4c # v2.23.0
        with:
          args: "-no-fail -fmt sarif -out gosec-results.sarif ./..."

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@4dd8fce5b2c8c0f4c5f40c7d5e8e7b2a3d4e5f6a # v3.27.1
        with:
          sarif_file: gosec-results.sarif
          category: gosec

  codeql-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4dd8fce5b2c8c0f4c5f40c7d5e8e7b2a3d4e5f6a # v3.27.1
        with:
          languages: go
          queries: security-and-quality

      - name: Autobuild
        run: |
          go mod download

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4dd8fce5b2c8c0f4c5f40c7d5e8e7b2a3d4e5f6a # v3.27.1
        with:
          category: "/language:go"
