# Dependency Review - Security by Design
name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@6622387beac6f2a9e5a19e5b1d6d3d3d4a3c1a8d # v4.3.5
        with:
          fail-on-severity: high
