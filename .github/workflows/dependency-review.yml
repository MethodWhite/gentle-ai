# Dependency Review - Security by Design
name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@6622387beac6f2a9e5a19e5b1d6d3d3d4a3c1a8d # v4.3.5
        with:
          fail-on-severity: high
