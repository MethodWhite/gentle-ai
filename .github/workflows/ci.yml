name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@5e44a8f8681e6e3d5a0ffbd4aba5c2c1e0c3c0c # v5.6.0
        with:
          go-version: "1.22"
          cache: true

      - name: Run unit tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.0
        with:
          name: coverage
          path: coverage.out

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@5e44a8f8681e6e3d5a0ffbd4aba5c2c1e0c3c0c # v5.6.0
        with:
          go-version: "1.22"
          cache: true

      - name: Run E2E tests
        env:
          RUN_FULL_E2E: "1"
          RUN_BACKUP_TESTS: "1"
        run: |
          cd e2e
          chmod +x docker-test.sh
          ./docker-test.sh
